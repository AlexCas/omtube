name: release

# Dispara un release al pushear un tag vX.Y.Z.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # GITHUB_TOKEN crea el release en este repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # TAP_GITHUB_TOKEN es un PAT (scope: repo) con permiso de escritura en
          # AlexCas/homebrew-tap para publicar la fórmula. Crearlo como secret del repo.
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
