name: release

# Dispara un release al pushear un tag vX.Y.Z.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # GITHUB_TOKEN crea el release (binarios + checksums) en este repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publica la fórmula de Homebrew al tap a partir de los checksums del release.
      # TAP_GITHUB_TOKEN es un PAT (scope: repo) con escritura en AlexCas/homebrew-tap.
      - name: Publish Homebrew formula
        run: scripts/update-formula.sh "${GITHUB_REF_NAME}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
