# GoReleaser config para Omusic.
# Build local del release:  TAP_GITHUB_TOKEN=$(gh auth token) GITHUB_TOKEN=$(gh auth token) goreleaser release --clean
# Validar la config:        goreleaser check
version: 2

project_name: omusic

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: omusic
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # windows/arm64 se excluye: la dependencia de IPC por named pipes
    # (gopkg.in/natefinch/npipe.v2) solo provee stubs de syscall para windows
    # 386/amd64, por lo que arm64 no compila. El resto de la matriz (linux y
    # darwin amd64/arm64, windows amd64) sí se construye. Para recuperar
    # windows/arm64 habría que migrar el dial de IPC a una librería que lo
    # soporte (p.ej. github.com/Microsoft/go-winio).
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# La fórmula de Homebrew NO se genera aquí: GoReleaser v2.16 removió `brews` y su
# reemplazo (homebrew_casks) es solo-macOS, lo que rompería Linux. La fórmula se
# publica al tap con scripts/update-formula.sh (ver release.yml), que funciona en
# Linux y macOS.
